<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloxRewards - Free Robux & Game Codes</title>
    <style>
        /* CSS Reset & General Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #fff;
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* Navigation Bar */
        header {
            background-color: rgba(11, 12, 16, 0.95);
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid #1f2833;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #66fcf1;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-links a {
            font-size: 16px;
            font-weight: 600;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #66fcf1;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(11, 12, 16, 1)), url('hero.jpg') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            margin-top: 60px;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.5);
        }

        .hero h1 span {
            color: #66fcf1;
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 600px;
            margin-bottom: 40px;
            color: #c5a059;
            font-weight: 500;
        }

        .cta-btn {
            background-color: #66fcf1;
            color: #0b0c10;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.4);
        }

        .cta-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(102, 252, 241, 0.8);
        }

        /* Grid Containers */
        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin: 60px 0 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 80px;
            height: 4px;
            background-color: #66fcf1;
            margin: 10px auto 0;
            border-radius: 2px;
        }

        .grid-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        /* Game & Reward Cards */
        .card {
            background-color: #1f2833;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s, border 0.3s;
            border: 1px solid transparent;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: #66fcf1;
        }

        .card-img {
            height: 220px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* Local Images Links */
        .img-bloxfruits { background-image: url('bloxfruits.jpg'); } 
        .img-garden { background-image: url('garden.jpg'); } 
        .img-steer { background-image: url('steer.jpg'); } 
        .img-vip { background-image: url('vip.jpg'); } 
        .img-robux { background-image: url('robux.jpg'); } 

        .card-content {
            padding: 25px;
            text-align: center;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-content h3 {
            font-size: 22px;
            margin-bottom: 10px;
            color: #66fcf1;
        }

        .card-content p {
            color: #a9b7c6;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .card-btn {
            background-color: transparent;
            color: #66fcf1;
            border: 2px solid #66fcf1;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
        }

        .card-btn:hover {
            background-color: #66fcf1;
            color: #0b0c10;
        }

        /* Footer */
        footer {
            background-color: #0b0c10;
            text-align: center;
            padding: 40px 20px;
            margin-top: 80px;
            border-top: 2px solid #1f2833;
            color: #45f3ff;
            font-size: 14px;
        }

        /* POP-UP MODAL BOX SYSTEM */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            backdrop-filter: blur(8px);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: #1f2833;
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            border: 2px solid #66fcf1;
            box-shadow: 0 0 30px rgba(102, 252, 241, 0.3);
            transform: scale(0.7);
            transition: transform 0.4s ease;
        }

        .modal-overlay.active .modal-box {
            transform: scale(1);
        }

        .modal-box h2 {
            font-size: 26px;
            color: #66fcf1;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .modal-box p {
            color: #c5a059;
            font-size: 15px;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px;
            background: #0b0c10;
            border: 2px solid #45f3ff;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            outline: none;
            text-align: center;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #66fcf1;
            box-shadow: 0 0 10px rgba(102, 252, 241, 0.2);
        }

        .modal-submit-btn {
            background: #66fcf1;
            color: #0b0c10;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        .modal-submit-btn:hover {
            background: #45f3ff;
            transform: translateY(-2px);
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            color: #a9b7c6;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close-modal:hover {
            color: #ff4136;
        }

        /* Loading Spinner Animation */
        .loader {
            display: none;
            border: 4px solid #0b0c10;
            border-radius: 50%;
            border-top: 4px solid #66fcf1;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto 0;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .success-msg {
            display: none;
            color: #2ecc71;
            font-weight: bold;
            margin-top: 20px;
            font-size: 16px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header { padding: 20px; }
            .nav-links { display: none; }
            .hero h1 { font-size: 2.3rem; }
        }
    </style>
</head>
<body>

    <!-- Header / Navigation Menu -->
    <header>
        <div class="logo">BloxRewards</div>
        <ul class="nav-links">
            <li><a href="#hero">Home</a></li>
            <li><a href="#codes">Game Codes</a></li>
            <li><a href="#robux">Get Robux</a></li>
        </ul>
    </header>

    <!-- Hero Section -->
    <section class="hero" id="hero">
