<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloxZone | The Ultimate Roblox Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Modern Color Variables & Dark Base Theme */
        :root {
            --primary-cyan: #00e1ff;
            --accent-lime: #deff9a;
            --bg-deep-space: #06060b;
            --bg-card-dark: #11111f;
            --text-primary: #ffffff;
            --text-secondary: #a3a3c2;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-deep-space);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Header Navigation */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 6%;
            background-color: rgba(17, 17, 31, 0.96);
            border-bottom: 2px solid var(--primary-cyan);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }

        .brand-logo {
            font-size: 26px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .brand-logo span {
            color: var(--primary-cyan);
            text-shadow: 0 0 12px rgba(0, 225, 255, 0.6);
        }

        nav a {
            color: var(--text-primary);
            text-decoration: none;
            margin-left: 25px;
            font-weight: 600;
            font-size: 15px;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: var(--accent-lime);
        }

        /* Hero Core Summary Section */
        .hero-banner {
            text-align: center;
            padding: 100px 20px;
            background: radial-gradient(circle at center, #17172e 0%, var(--bg-deep-space) 80%);
            border-bottom: 2px dashed var(--accent-lime);
        }

        .hero-banner h1 {
            font-size: 56px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .hero-banner h1 span {
            color: var(--primary-cyan);
            text-shadow: 0 0 15px rgba(0, 225, 255, 0.4);
        }

        .hero-banner p {
            font-size: 20px;
            color: var(--text-secondary);
            max-width: 800px;
            margin: 0 auto;
            font-weight: 400;
        }

        /* Standardized Layout Container */
        .wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .block-title {
            font-size: 32px;
            color: var(--accent-lime);
            text-transform: uppercase;
            margin-bottom: 40px;
            border-left: 6px solid var(--primary-cyan);
            padding-left: 15px;
            letter-spacing: 1px;
        }

        /* Section: Featured Experiences Card Grid */
        .experience-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 30px;
            margin-bottom: 70px;
        }
