<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloxZone | The Ultimate Roblox Hub</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --secondary-bg: #1f2833;
            --text-color: #c5c6c7;
            --title-color: #ffffff;
            --accent-cyan: #45f3ff;
            --accent-green: #00ff87;
            --accent-purple: #8a2be2;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding-bottom: 60px;
        }

        header {
            background: linear-gradient(135deg, #111, #222);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 3px solid var(--accent-cyan);
        }

        header h1 {
            color: var(--title-color);
            font-size: 3rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px var(--accent-cyan);
        }

        header p {
            font-size: 1.2rem;
            color: var(--accent-cyan);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        section {
            margin: 40px 0;
            background-color: var(--secondary-bg);
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        h2 {
            color: var(--title-color);
            font-size: 2rem;
            margin-bottom: 20px;
            border-left: 5px solid var(--accent-green);
            padding-left: 15px;
        }

        /* Experience Grid Grid */
        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 768px) {
            .grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .card {
            background-color: #151c24;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #2d3748;
            display: flex;
            flex-direction: column;
        }

        .card img {
            width: 100%;
            height: auto;
            max-height: 300px;
            object-fit: cover;
        }

        .card-content {
            padding: 20px;
        }

        .card-content h3 {
            color: var(--title-color);
            margin-bottom: 10px;
            font-size: 1.5rem;
        }

        /* Table Styles */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: #151c24;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #2d3748;
        }

        th {
            background-color: #25303f;
            color: var(--accent-cyan);
            font-weight: bold;
        }

        tr:hover {
            background-color: #1e2936;
        }

        .code-badge {
            background-color: #2d3748;
            padding: 5px 10px;
            border-radius: 4px;
            font-family: monospace;
            color: var(--accent-green);
            font-weight: bold;
        }
