<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloxZone | Free Codes & Robux Platform</title>
    <style>
        /* Exact color scheme pulled from your visual references */
        :root {
            --primary-color: #00e1ff;
            --secondary-color: #deff9a; /* The exact bright lime/green accent from your image */
            --bg-dark: #0a0a12;
            --card-bg: #131322;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Navbar Layout */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background-color: rgba(19, 19, 34, 0.95);
            border-bottom: 2px solid var(--primary-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            color: var(--primary-color);
            text-shadow: 0 0 10px var(--primary-color);
        }

        nav a {
            color: var(--text-color);
            text-decoration: none;
            margin-left: 25px;
            font-weight: 600;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--secondary-color);
        }

        /* Hero Splash Banner */
        .hero {
            text-align: center;
            padding: 80px 20px;
            background: linear-gradient(180deg, #131322 0%, #0a0a12 100%);
            border-bottom: 2px dashed var(--primary-color);
        }

        .hero h1 {
            font-size: 42px;
            margin-bottom: 15px;
        }

        .hero h1 span {
            color: var(--secondary-color);
        }

        /* Layout Container */
        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
        }

        /* Precise title accent alignment matching the screenshot styling */
        .section-title {
            font-size: 32px;
            margin-bottom: 40px;
            text-transform: uppercase;
            border-left: 6px solid var(--primary-color);
            padding-left: 15px;
            letter-spacing: 1px;
        }

        /* Interactive Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 80px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            border: 1px solid #23233b;
            transition: transform 0.3s, border-color 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
        }

        /* FIXED: Instant Loading CSS Image Fallback Plaecholders */
        .card-img-placeholder {
            width: 100%;
            height: 220px;
            background: linear-gradient(135deg, #1a1a2e 0%, #252542 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            border-bottom: 2px solid #23233b;
        }

        .card-body {
            padding: 25px;
        }

        .card-title {
            font-size: 24px;
            margin-top: 0;
            color: var(--secondary-color);
        }

        .code-box {
            background-color: #0a0a12;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            border: 1px dashed #444;
        }

        .code-text {
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 18px;
            letter-spacing: 1px;
        }

        .btn-btn {
            background-color: var(--primary-color);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-btn:hover {
            background-color: #fff;
            box-shadow: 0 0 10px var(--primary-color);
        }
